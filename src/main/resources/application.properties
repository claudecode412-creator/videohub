spring.application.name=videohub

# --- Server ---
# The host (e.g. Render) provides a PORT to listen on; fall back to 8080 locally.
server.port=${PORT:8080}

# --- Where uploaded video files are written on disk ---
app.storage.location=uploads

# --- Multipart upload limits (Spring's default 1MB is far too small for video) ---
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

# --- H2 database, stored in a file so data survives restarts ---
spring.datasource.url=jdbc:h2:file:./data/videohub;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate: auto-create and update the schema from the entities ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- Browser-based H2 console at http://localhost:8080/h2-console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Admin login (the only account that can upload/edit/delete) ---
# Locally these default to admin/admin123. In the cloud, set ADMIN_USERNAME and
# ADMIN_PASSWORD as environment variables so the real password never lives in code.
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}
