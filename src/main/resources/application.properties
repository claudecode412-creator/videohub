spring.application.name=videohub

# --- Server ---
# The host (e.g. Render) provides a PORT to listen on; fall back to 8080 locally.
server.port=${PORT:8080}
# Trust the host's proxy headers so generated URLs use https and the real host.
server.forward-headers-strategy=framework

# --- Subscription pass (defaults: ₹99 for 30 days) ---
app.pass.price-minor=${PASS_PRICE_MINOR:9900}
app.pass.currency=${PASS_CURRENCY:inr}
app.pass.days=${PASS_DAYS:30}

# --- Stripe (set these in the cloud; blank locally means payments are disabled) ---
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# --- Video storage ---
# Local disk by default. In the cloud, set the R2_* environment variables below
# and videos are stored in Cloudflare R2 instead (so they survive restarts).
app.storage.location=uploads
app.storage.r2.bucket=${R2_BUCKET:}
app.storage.r2.endpoint=${R2_ENDPOINT:}
app.storage.r2.access-key=${R2_ACCESS_KEY_ID:}
app.storage.r2.secret-key=${R2_SECRET_ACCESS_KEY:}
app.storage.r2.public-base-url=${R2_PUBLIC_BASE_URL:}

# --- Multipart upload limits (Spring's default 1MB is far too small for video) ---
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

# --- Database ---
# Local default: H2 file database. In the cloud, set DATABASE_URL (plus
# DATABASE_USERNAME / DATABASE_PASSWORD) to a Postgres connection (Neon) so the
# video list survives restarts. The driver is inferred from the URL.
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/videohub;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# --- JPA / Hibernate: auto-create and update the schema from the entities ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- Browser-based H2 console (dev only). Off by default so it is never exposed
#     on the public site; set H2_CONSOLE_ENABLED=true locally if you want it. ---
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# --- Admin login (the only account that can upload/edit/delete) ---
# Locally these default to admin/admin123. In the cloud, set ADMIN_USERNAME and
# ADMIN_PASSWORD as environment variables so the real password never lives in code.
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}
