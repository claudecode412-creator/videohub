<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin login · VideoHub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='22' width='100' height='100' fill='%238b5cf6'/><path d='M40 32 L70 50 L40 68 Z' fill='white'/></svg>">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-logo">
            <svg viewBox="0 0 24 24" width="26" height="26"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
        </div>
        <h1>Admin login</h1>
        <p class="auth-sub">Sign in to upload and manage videos.</p>

        <p class="auth-err" th:if="${param.error}">Incorrect username or password.</p>
        <p class="auth-ok" th:if="${param.logout}">You have been logged out.</p>

        <form method="post" action="/admin/login" class="auth-form">
            <label class="field">
                <span>Username</span>
                <input name="username" autocomplete="username" autofocus required>
            </label>
            <label class="field">
                <span>Password</span>
                <input type="password" name="password" autocomplete="current-password" required>
            </label>
            <button class="btn btn-primary auth-submit" type="submit">Log in</button>
        </form>

        <a class="auth-back" href="/">← Back to site</a>
    </div>
</body>
</html>
