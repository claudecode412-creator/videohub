<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up · VideoHub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='22' width='100' height='100' fill='%238b5cf6'/><path d='M40 32 L70 50 L40 68 Z' fill='white'/></svg>">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-logo">
            <svg viewBox="0 0 24 24" width="26" height="26"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
        </div>
        <h1>Create your account</h1>
        <p class="auth-sub">Sign up to like videos and support creators.</p>

        <p class="auth-err" id="authError" hidden></p>

        <form id="signupForm" class="auth-form" novalidate>
            <label class="field">
                <span>Email</span>
                <input type="email" id="email" name="email" autocomplete="email" autofocus required>
            </label>
            <label class="field">
                <span>Password <em>(at least 8 characters)</em></span>
                <input type="password" id="password" name="password" autocomplete="new-password" required>
            </label>
            <button class="btn btn-primary auth-submit" type="submit" id="submitBtn">Sign up</button>
        </form>

        <p class="auth-alt">Already have an account? <a href="/login">Log in</a></p>
        <a class="auth-back" href="/">← Back to site</a>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
