<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VideoHub — watch videos, streaming instantly.">
    <title>VideoHub — Stream Everything</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='22' width='100' height='100' fill='%238b5cf6'/><path d='M40 32 L70 50 L40 68 Z' fill='white'/></svg>">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <!-- ===== Top navigation (public — no admin controls) ===== -->
    <header class="nav">
        <div class="nav-inner">
            <a class="brand" href="/" aria-label="VideoHub home">
                <span class="brand-logo" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
                </span>
                <span class="brand-name">Video<span class="grad">Hub</span></span>
            </a>

            <div class="search" role="search">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                    <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                          d="M21 21l-4.3-4.3M11 19a8 8 0 100-16 8 8 0 000 16z"/>
                </svg>
                <input id="searchInput" type="search" placeholder="Search videos…" autocomplete="off"
                       aria-label="Search videos">
            </div>
        </div>
    </header>

    <!-- ===== Hero ===== -->
    <section class="hero">
        <div class="hero-glow" aria-hidden="true"></div>
        <div class="hero-inner">
            <h1 class="hero-title">Watch. Discover. <span class="grad">Enjoy.</span></h1>
            <p class="hero-sub">Stream every video instantly — no sign-up, just press play.</p>
        </div>
    </section>

    <!-- ===== Library ===== -->
    <main class="container">
        <div class="section-head">
            <h2 id="sectionTitle">Recent uploads</h2>
            <span class="section-count" id="sectionCount"></span>
        </div>

        <div id="grid" class="grid" aria-live="polite"></div>

        <div id="emptyState" class="empty" hidden>
            <div class="empty-icon">🎬</div>
            <h3>No videos yet</h3>
            <p>Check back soon — new videos are on the way.</p>
        </div>

        <div id="listStatus" class="list-status"></div>
        <nav id="pager" class="pager" aria-label="Video pages"></nav>

        <div id="pageSizeBar" class="page-size-bar" hidden>
            <label class="page-size" for="pageSizeSelect">Videos per page</label>
            <select id="pageSizeSelect" aria-label="Videos per page">
                <option value="10">10</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>
    </main>

    <!-- ===== Watch modal ===== -->
    <div class="modal" id="watchModal" hidden>
        <div class="modal-backdrop" data-close="watchModal"></div>
        <div class="modal-card watch-card" role="dialog" aria-modal="true" aria-labelledby="watchTitle">
            <button class="icon-btn watch-close" data-close="watchModal" aria-label="Close">
                <svg viewBox="0 0 24 24" width="22" height="22"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/></svg>
            </button>
            <div class="player-wrap">
                <video id="player" controls playsinline preload="metadata"></video>
            </div>
            <div class="watch-meta">
                <h3 id="watchTitle"></h3>
                <div class="watch-sub">
                    <span id="watchStats"></span>
                    <button class="like-btn" id="likeBtn" aria-pressed="false" aria-label="Like this video">
                        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                            <path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"
                                  d="M12 20s-7-4.35-9.5-8.5C1 8.5 2.5 5.5 5.5 5.5c2 0 3.2 1.3 3.9 2.4C10.3 6.8 11.5 5.5 13.5 5.5c3 0 4.5 3 3 6C19 15.65 12 20 12 20z"/>
                        </svg>
                        <span id="likeCount">0</span>
                    </button>
                </div>
                <p id="watchDesc" class="watch-desc"></p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" hidden></div>

    <script src="/js/app.js"></script>
</body>
</html>
